# ─────────────────────────────────────────────────────────────────────────────
# Nginx — SCTE-35 Overlay Engine
#
# Install:
#   sudo ln -sf /opt/scte35/nginx/scte35.conf /etc/nginx/sites-enabled/scte35
#   sudo nginx -t && sudo systemctl reload nginx
#
# What this does:
#   • Serves the built React dashboard (frontend/dist) on port 80
#   • Proxies /api/*  requests to uvicorn on 127.0.0.1:8000
#   • Proxies /ws/*   WebSocket connections to uvicorn on 127.0.0.1:8000
#
# To use HTTPS, replace the listen block with certbot / Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

upstream scte35_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your server's IP or domain name.
    # Use _ to match any hostname (useful when accessing by IP).
    server_name _;

    # ── Static frontend files ────────────────────────────────────────────────
    root /opt/scte35/frontend/dist;
    index index.html;

    # Serve static assets with long cache; fall back to index.html for SPA routing.
    location / {
        try_files $uri $uri/ /index.html;

        # Aggressive cache for hashed assets (Vite adds content hash to filenames).
        location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Backend REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://scte35_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-running start/stop calls.
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── WebSocket live event feed ────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://scte35_backend;
        proxy_http_version 1.1;

        # Required headers for WebSocket upgrade.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Keep WebSocket alive for 24 h (long-running broadcast session).
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer"  always;

    # ── Misc ─────────────────────────────────────────────────────────────────
    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
